apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: production
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: python-web-app
    spec:
      template:
        spec:
          containers:
          - name: web-container
            env:
            - name: ENVIRONMENT
              value: "PRODUCTION"