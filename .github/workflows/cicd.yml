name: CI/CD Pipeline - Build, Push & Deploy

on:
  workflow_dispatch:

# Required for Workload Identity Federation (no SA key needed)
permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: project-69f6f6fe-42ac-4d0e-8cd
  REGION: us-central1
  AR_REPO: python-web-app-images        # Artifact Registry repo name
  IMAGE_NAME: python-web-app            # Image name inside the repo
  DEPLOY_PIPELINE: python-app-pipeline  # Cloud Deploy delivery pipeline name

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP via Workload Identity Federation ──────────────
      #       No SA key file needed — GitHub OIDC token is used instead.
      #       GitHub Secrets required:
      #         WIF_PROVIDER        → projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider
      #         WIF_SERVICE_ACCOUNT → cicd-pipeline-sa@project-69f6f6fe-42ac-4d0e-8cd.iam.gserviceaccount.com
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # ── 3. Install gcloud SDK ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # ── 4. Configure Docker to push to Artifact Registry ─────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── 5. Build Docker image ─────────────────────────────────────────────────
      #       Build context is ./app  (Dockerfile + app.py live there)
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ./app

      # ── 6. Push image to Artifact Registry ───────────────────────────────────
      - name: Push Docker image
        run: |
          docker push \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── 7. Create Cloud Deploy release ───────────────────────────────────────
      #       - Auto-deploys to STAGING immediately
      #       - PRODUCTION rollout requires manual approval in Cloud Deploy console
      - name: Create Cloud Deploy release
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          gcloud deploy releases create "release-${SHORT_SHA}-${{ github.run_number }}" \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --delivery-pipeline=${{ env.DEPLOY_PIPELINE }} \
            --skaffold-file=k8s/skaffold.yaml \
            --source=. \
            --images=${{ env.IMAGE_NAME }}-image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── 8. Print summary ─────────────────────────────────────────────────────
      - name: Print deployment summary
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "============================================"
          echo "  Image pushed:"
          echo "  ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "  Cloud Deploy release: release-${SHORT_SHA}-${{ github.run_number }}"
          echo "  Pipeline: ${{ env.DEPLOY_PIPELINE }}"
          echo ""
          echo "  STAGING    → deployed automatically"
          echo "  PRODUCTION → approve in Cloud Deploy console"
          echo "============================================"
